#@TYPE: Machine
#@NAME: muse-pi-pro
#@SOC: SpacemiT K1
#@DESCRIPTION: Machine configuration for Muse Pi Pro with mainline Linux

require include/k1.inc

KERNEL_DEVICETREE ?= "spacemit/k1-musepi-pro.dtb"

# Muse Pi Pro is not supported yet in mainline U-Boot. Use the BananaPi F3 for
# now, but leave this in the .conf file instead of k1.inc so make it clear it
# needs to change later
UBOOT_MACHINE = "bananapi-f3_defconfig"
