#@TYPE: Machine
#@NAME: milkv-duo-s
#@SOC: Sophgo SG2000 / CV1813H
#@DESCRIPTION: Machine configuration for Milk-V Duo S

require conf/machine/include/milkv-common.inc

PREFERRED_PROVIDER_virtual/kernel ?= "linux-milkv-duo-s"
UBOOT_MACHINE ?= "milkv_duo_s_defconfig"
KERNEL_DEVICETREE ?= "sophgo/sg2000-milkv-duo-s.dtb"

WKS_FILE ?= "milkv-duo-s.wks"
# For eMMC boot images: WKS_FILE = "milkv-duo-s-emmc.wks"
# See wic/milkv-duo-s-emmc.wks for flashing instructions.

# Duo S has on-board eMMC
MACHINE_EXTRA_RRECOMMENDS += "mmc-utils"

# Opt-in features that change kernel config, DTS, or installed packages
# Users enable in local.conf: MACHINE_FEATURES:append = " wifi"
# Available: wifi, bluetooth
